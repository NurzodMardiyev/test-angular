<div class="flex  items-center mx-2 ">
  <!-- Flag as menu toggle -->
  <button
    class="flag-toggle"
    (click)="langMenu.toggle($event)"
    pTooltip="{{ selectedLang.name }}"
    tooltipPosition="bottom"
  >
    <span class="flag-icon fi fi-{{ selectedLang.icon }}"></span>
  </button>

  <span class="text-sm px-2">{{ selectedLang.name }}</span>

  <!-- Language menu -->
  <p-menu #langMenu [model]="menuItems" [popup]="true" class=" float-end"></p-menu>
</div>
