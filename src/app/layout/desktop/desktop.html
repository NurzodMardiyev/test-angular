<div class="h-screen flex ">

<!-- FLOATING SLIM SIDEBAR -->
  <aside
    class="w-[106px] py-2 flex flex-col items-center gap-4 my-4 ml-4
         rounded-2xl shadow-lg bg-white dark:bg-[var(--p-surface-900)]">


    <!-- LOGO -->
    <div class="w-20  rounded-xl flex items-center justify-center">
      <img src="./assets/logo.png" alt="Logo">
    </div>

    <div class="w-full px-1">
      <app-menues></app-menues>
    </div>

    <!-- BOTTOM -->
    <div class="mt-auto flex flex-col mb-2">
      <p-button size="large" [text]="true">
        <i class="pi pi-question-circle w-[30px]"></i>
      </p-button>
      <p-divider [layout]="'horizontal'"></p-divider>
      <p-button size="large" [text]="true" (onClick)="toggle($event)">
        <svg width="30" height="30" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">

        </svg>
      </p-button>
    </div>
  </aside>

  <!-- MAIN AREA -->
  <div class="flex-1 flex flex-col px-6  pt-4 gap-4  ">

    <!-- HEADER -->
    <header class="flex items-center justify-between ">
      <div class="md:min-w-[500px]">
        <h1 class="text-xl font-[400] text-[#69748B] dark:text-[#838996] animated-header uppercase">{{ 'header.subtitle' | translate }}</h1>
        <p class="font-semibold text-3xl text-[#334155] dark:text-white uppercase">{{ 'header.title' | translate }}</p>
      </div>

      <div class="flex items-center gap-3 md:min-w-[600px] justify-end">

        <p-iconfield>
          <p-inputicon class="pi pi-search" />
          <input
            type="text"
            pInputText
            placeholder="Search"
            pSize="small"
            class="!transition-all !duration-300"
            [ngClass]="{'w-[300px]': expanded, '!w-[100px]': !expanded}"
            (focus)="expanded = true"
            (blur)="expanded = false"
          />
        </p-iconfield>

        <theme-switcher [toTop]="false"></theme-switcher>

        <app-language-switcher></app-language-switcher>

        <p-button [text]="true"><i class="pi pi-bell" style="font-size: 1.2rem"></i></p-button>
      </div>
    </header>

    <!-- CONTENT GRID -->
    <div class="grid grid-cols-12 gap-6 flex-1 overflow-y-auto">
      <section #animated_box class="animated-header col-span-12 rounded pr-2 min-h-[400px]">
        <router-outlet></router-outlet>
      </section>
    </div>
  </div>
</div>


<p-popover  #op [appendTo]="'body'" styleClass="right-side-popover">
  <div class="flex gap-4">
    <div>
      <span class="font-medium block ">
        <app-profile></app-profile>
      </span>
    </div>
  </div>
</p-popover>
